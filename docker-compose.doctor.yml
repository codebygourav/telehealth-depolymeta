services:
  doctor-deploymeta:
    build:
      context: ./frontend/doctor
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${DOCTOR_API_URL}
        NEXT_PUBLIC_API_URL: ${DOCTOR_API_URL}
    container_name: doctor-deploymeta
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${DOCTOR_API_URL}
      NEXT_PUBLIC_API_URL: ${DOCTOR_API_URL}
    networks:
      - telehealth-network
    ports:
      - "3002:3000" # Expose to a specific port if not using the shared proxy

networks:
  telehealth-network:
    external: true
