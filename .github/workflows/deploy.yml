name: Smart Deploy

on:
  push:
    branches:
      - main

jobs:

  detect-changes:
    runs-on: ubuntu-latest

    outputs:
      patient: ${{ steps.filter.outputs.patient }}
      doctor: ${{ steps.filter.outputs.doctor }}
      backend: ${{ steps.filter.outputs.backend }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            patient:
              - 'frontend/patient/**'

            doctor:
              - 'frontend/doctor/**'

            backend:
              - 'backend/**'

  # ==========================================
  # PATIENT
  # ==========================================
  deploy-patient:
    needs: detect-changes
    if: needs.detect-changes.outputs.patient == 'true'

    runs-on: ubuntu-latest

    steps:
      - name: Deploy Patient
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}

          script: |
            set -e

            cd ${{ secrets.PROJECT_PATH }}

            git reset --hard
            git pull origin main

            docker compose -f docker-compose.prod.yml up -d --build patient

  # ==========================================
  # DOCTOR
  # ==========================================
  deploy-doctor:
    needs: detect-changes
    if: needs.detect-changes.outputs.doctor == 'true'

    runs-on: ubuntu-latest

    steps:
      - name: Deploy Doctor
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}

          script: |
            set -e

            cd ${{ secrets.PROJECT_PATH }}

            git reset --hard
            git pull origin main

            docker compose -f docker-compose.prod.yml up -d --build doctor

  # ==========================================
  # BACKEND
  # ==========================================
  deploy-backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'

    runs-on: ubuntu-latest

    steps:
      - name: Deploy Backend
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}

          script: |
            set -e

            cd ${{ secrets.PROJECT_PATH }}

            git reset --hard
            git pull origin main

            docker compose -f docker-compose.prod.yml up -d --build app web

            sleep 10

            docker compose -f docker-compose.prod.yml exec -T app php artisan migrate --force
