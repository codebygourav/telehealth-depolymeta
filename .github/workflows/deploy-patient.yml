name: Deploy Patient Portal

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/patient/**'
      - 'docker-compose.patient.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Hostinger VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /docker/telehealth-patient
            git pull origin main
            docker compose -f docker-compose.patient.yml up -d --build
