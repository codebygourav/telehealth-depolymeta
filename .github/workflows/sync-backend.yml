name: Sync Backend from Git1

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo2
        uses: actions/checkout@v4

      - name: Checkout Repo1
        uses: actions/checkout@v4
        with:
          repository: CMC-Telehealth-Filemant/cmc-telehealth-filament
          token: ${{ secrets.REPO1_TOKEN }}
          path: source
          ref: main
          persist-credentials: false

      - name: Sync → backend
        run: |
          mkdir -p backend
          rsync -av \
          --exclude 'node_modules' \
          --exclude 'vendor' \
          --exclude '.git' \
          --exclude '.env' \
          --exclude 'storage' \
          source/ backend/

      - name: Commit & Push
        run: |
          git config user.name "sync-bot"
          git config user.email "sync@bot.com"
          git add backend/
          git commit -m "Auto sync backend from Git1" || echo "No changes"
          git push
