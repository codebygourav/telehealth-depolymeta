services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: repo2-backend-app
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    depends_on:
      - db
    command: >
      sh -c "
      if [ ! -f .env ]; then cp .env.example .env; fi &&
      composer install --no-interaction --prefer-dist &&
      if ! grep -q '^APP_KEY=base64:' .env; then php artisan key:generate --force; fi &&
      php-fpm"
    restart: unless-stopped
    networks:
      - cmc_net

  web:
    image: nginx:alpine
    container_name: repo2-backend-web
    ports:
      - "8100:80"
    volumes:
      - .:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: repo2-backend-phpmyadmin
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: cmc_user
      PMA_PASSWORD: cmc_pass
      PMA_ARBITRARY: 1
    ports:
      - "9100:80"
    depends_on:
      - db

  db:
    image: mysql:8
    container_name: repo2-backend-db
    environment:
      MYSQL_DATABASE: cmc_telehealth
      MYSQL_USER: cmc_user
      MYSQL_PASSWORD: cmc_pass
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - repo2_backend_db_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  repo2_backend_db_data:
