services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cmc-telehealth_app
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    depends_on:
      - db
    networks:
      - cmc_net

  web:
    image: nginx:alpine
    container_name: cmc-telehealth_web
    ports:
      - "8800:80"
    volumes:
      - .:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - cmc_net

  db:
    image: mysql:8
    container_name: cmc-telehealth_db
    environment:
      MYSQL_DATABASE: cmc_telehealth
      MYSQL_USER: cmc_user
      MYSQL_PASSWORD: cmc_pass
      MYSQL_ROOT_PASSWORD: root
    ports:  
      - "3307:3306"
    volumes:
      - cmc_db_data:/var/lib/mysql
    networks:
      - cmc_net

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: cmc-telehealth_phpmyadmin
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: cmc_user
      PMA_PASSWORD: cmc_pass
      PMA_ARBITRARY: 1
    ports:
      - "9900:80"
    depends_on:
      - db
    networks:
      - cmc_net

networks:
  cmc_net:

volumes:
  cmc_db_data:
