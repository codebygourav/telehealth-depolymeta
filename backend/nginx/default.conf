server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php index.html;

    client_max_body_size 100M;

    # Increase FastCGI buffers to handle large Filament/Livewire responses
    fastcgi_buffer_size          128k;
    fastcgi_buffers              16 128k;
    fastcgi_busy_buffers_size    256k;
    fastcgi_temp_file_write_size 256k;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Dedicated block for Livewire temporary file uploads — longer timeout
    # NOTE: Must NOT combine try_files with fastcgi_pass — route directly to PHP-FPM
    location /livewire/upload-file {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        # Always route to index.php (Livewire upload endpoint is handled by Laravel)
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_param DOCUMENT_ROOT  $document_root;
        fastcgi_read_timeout 300s;
        client_max_body_size 100M;
    }

    location ~ \.php$ {
        try_files $uri =404;
        include fastcgi_params;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT  $document_root;
        fastcgi_read_timeout 300s;
    }

    location ~ /\.ht {
        deny all;
    }
}