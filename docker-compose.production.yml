services:
  # --- Database ---
  db:
    image: mysql:8
    container_name: repo2-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-cmc_telehealth}
      MYSQL_USER: ${DB_USERNAME:-cmc_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-cmc_pass}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - telehealth-network

  # --- Backend (Laravel) ---
  backend-app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: repo2-backend-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - db
    networks:
      - telehealth-network
    env_file:
      - ./backend/.env

  backend-web:
    image: nginx:alpine
    container_name: repo2-backend-web
    restart: unless-stopped
    volumes:
      - ./backend:/var/www/html
      - ./backend/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend-app
    networks:
      - telehealth-network

  # --- Frontend (Patient) ---
  frontend-patient:
    build:
      context: ./frontend/patient
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${PATIENT_API_URL}
    container_name: repo2-frontend-patient
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${PATIENT_API_URL}
    networks:
      - telehealth-network

  # --- Frontend (Doctor) ---
  frontend-doctor:
    build:
      context: ./frontend/doctor
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${DOCTOR_API_URL}
        NEXT_PUBLIC_API_URL: ${DOCTOR_API_URL}
    container_name: repo2-frontend-doctor
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${DOCTOR_API_URL}
      NEXT_PUBLIC_API_URL: ${DOCTOR_API_URL}
    networks:
      - telehealth-network

  # --- Reverse Proxy (Nginx) ---
  # This container will route traffic from your domains to the correct services.
  proxy:
    image: nginx:alpine
    container_name: repo2-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-proxy.conf:/etc/nginx/conf.d/default.conf
      - ./certs:/etc/nginx/certs
    depends_on:
      - backend-web
      - frontend-patient
      - frontend-doctor
    networks:
      - telehealth-network

networks:
  telehealth-network:
    driver: bridge

volumes:
  db_data:
