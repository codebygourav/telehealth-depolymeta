services:
  # --- Database ---
  db:
    image: mysql:8
    container_name: telehealth-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-cmc_telehealth}
      MYSQL_USER: ${DB_USERNAME:-cmc_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-cmc_pass}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - telehealth-network

  # --- Admin Dashboard (Laravel Backend) ---
  admin-dashboard:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: admin-dashboard-app
    restart: unless-stopped
    working_dir: /var/www/html
    depends_on:
      - db
    networks:
      - telehealth-network
    env_file:
      - ./backend/.env

  admin-web:
    image: nginx:alpine
    container_name: admin-dashboard-web
    restart: unless-stopped
    volumes:
      - ./backend/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - admin-dashboard
    networks:
      - telehealth-network

  # --- Patient Portal ---
  patient-deploymeta:
    build:
      context: ./frontend/patient
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${PATIENT_API_URL}
    container_name: patient-deploymeta
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${PATIENT_API_URL}
    networks:
      - telehealth-network

  # --- Doctor Portal ---
  doctor-deploymeta:
    build:
      context: ./frontend/doctor
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${DOCTOR_API_URL}
        NEXT_PUBLIC_API_URL: ${DOCTOR_API_URL}
    container_name: doctor-deploymeta
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${DOCTOR_API_URL}
      NEXT_PUBLIC_API_URL: ${DOCTOR_API_URL}
    networks:
      - telehealth-network

  # --- Reverse Proxy (Nginx) ---
  proxy:
    image: nginx:alpine
    container_name: telehealth-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-proxy.conf:/etc/nginx/conf.d/default.conf
      - ./certs:/etc/nginx/certs
    depends_on:
      - admin-web
      - patient-deploymeta
      - doctor-deploymeta
    networks:
      - telehealth-network

networks:
  telehealth-network:
    driver: bridge

volumes:
  db_data:

