services:
  tele-deploymeta-patient:
    build:
      context: .
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}

    container_name: tele-deploymeta-patient
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}

    ports:
      - "8001:3000"

    restart: always
    