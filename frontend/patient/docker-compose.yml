services:
  cmc-telehealth-pwa-patient:
    build:
      context: .
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}

    container_name: cmc-telehealth-pwa-patient
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}

    ports:
      - "8001:3000"

    restart: always
